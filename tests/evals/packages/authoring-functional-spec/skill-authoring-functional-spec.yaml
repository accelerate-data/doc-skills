# yaml-language-server: $schema=https://promptfoo.dev/config-schema.json
description: "authoring-functional-spec skill — core functional-spec authoring contract"

prompts:
  - id: authoring-functional-spec
    label: authoring-functional-spec
    raw: file://../../prompts/skill-authoring-functional-spec.txt

providers:
  - id: file://../../scripts/opencode-cli-provider.js
    config:
      provider_id: opencode
      model: qwen3.6-plus
      working_dir: ../..
      max_turns: 12
      tools:
        read: true
        grep: true
        glob: true
        list: true
        bash: true

defaultTest:
  assert:
    - type: javascript
      value: file://../../assertions/check-authoring-functional-spec-contract.js

tests:
  - description: "routes functional spec request to authoring-functional-spec"
    vars:
      scenario: |-
        User prompt:
        "Create the functional spec for flow intent-user-data-mart-build. I want the behavior and acceptance rules under docs/functional, not a design doc yet."
      expect_routes_functional_docs_to_authoring_functional_spec: "true"

  - description: "rejects design doc request as functional spec work"
    vars:
      scenario: |-
        User prompt:
        "Write the technical design for intent-user-data-mart-build. The functional spec already exists."
      expect_routes_functional_docs_to_authoring_functional_spec: "false"
      expect_rejects_design_specs: "true"

  - description: "rejects implementation plan request and hands user the spec path"
    vars:
      scenario: |-
        User prompt:
        "Turn the intent-user-data-mart-build functional spec into implementation tasks."
      expect_routes_functional_docs_to_authoring_functional_spec: "false"
      expect_rejects_implementation_plans: "true"
      expect_hands_user_canonical_id_and_spec_path: "true"

  - description: "preconditions — validates tooling, auth, git checkout, and allowed repo"
    vars:
      scenario: |-
        User prompt:
        "Author a functional spec for intent-user-data-mart-build."

        Workspace context:
        The agent is in a git checkout with an origin URL that may or may not be one of the supported product repos. The User-Flows-Details Sheet is accessed through gws.
      expect_checks_gws_auth_git_and_repo: "true"
      expect_resolves_allowed_repos_from_sheet_column_c: "true"
      expect_aborts_outside_sheet_resolved_repos: "true"

  - description: "preconditions — falls back to manual review when verification skill unavailable"
    vars:
      scenario: |-
        User prompt:
        "Author the functional spec for intent-user-data-mart-build and pressure-test it before you call it done."

        Workspace context:
        The active runtime does not expose superpowers:verification-before-completion.
      expect_checks_required_skill_availability: "true"
      expect_aborts_when_required_skill_missing: "false"
      expect_falls_back_when_required_skill_missing: "true"

  - description: "sheet lookup — canonical ID fetch avoids status column and Sheet writes"
    vars:
      scenario: |-
        User prompt:
        "Use the User-Flows sheet row for intent-user-data-mart-build and create the FS in the repo named by the sheet."

        Workspace context:
        The sheet has columns for canonical ID, repo, category, title, status, and persona. Status is operational metadata, not spec content.
      expect_fetches_sheet_row_for_id: "true"
      expect_extracts_allowed_sheet_columns_only: "true"
      expect_does_not_read_status_column: "true"
      expect_does_not_write_sheet: "true"
      expect_verifies_repo_alignment: "true"
      expect_functional_spec_lives_in_sheet_repo: "true"
      expect_one_flow_one_functional_spec: "true"

  - description: "missing id — asks for canonical ID and aborts when no row found"
    vars:
      scenario: |-
        User prompt:
        "Author a functional spec. I don't remember the exact canonical ID."

        Workspace context:
        The user cannot name the canonical ID. The Sheet has no row matching any guess the user provides.
      expect_asks_for_canonical_id_when_missing: "true"
      expect_aborts_when_no_row_found: "true"

  - description: "candidate selection — repo-filtered candidate IDs"
    vars:
      scenario: |-
        User prompt:
        "I know this is a skill-builder flow, but I can't remember the ID. Show me the likely flow IDs so I can pick one."

        Workspace context:
        The Sheet contains flows for studio, skill-builder, domain-cicd, and migration-utility. The current checkout resolves to skill-builder.
      expect_asks_for_canonical_id_when_missing: "true"
      expect_lists_candidate_ids_for_current_repo: "true"

  - description: "paths — spec lives at README.md; never creates a duplicate"
    vars:
      scenario: |-
        User prompt:
        "Update the functional spec for intent-user-data-mart-build."

        Workspace context:
        docs/functional/intent-user-data-mart-build/README.md exists. No other spec file exists for this canonical ID.
      expect_updates_existing_spec_in_place: "true"
      expect_never_creates_duplicate_functional_spec: "true"
      expect_functional_spec_lives_in_sheet_repo: "true"

  - description: "child pages — acknowledged as supporting material, out of scope for authoring"
    vars:
      scenario: |-
        User prompt:
        "The functional spec for intent-user-data-mart-build has a ui-details.md beside the README. Should I author that too?"

        Workspace context:
        docs/functional/intent-user-data-mart-build/ contains README.md and ui-details.md.
      expect_routes_functional_docs_to_authoring_functional_spec: "true"
      expect_treats_child_pages_as_out_of_scope: "true"
      expect_authors_readme_only: "true"

  - description: "drafting — gathers behavioral context and keeps behavior altitude"
    vars:
      scenario: |-
        User prompt:
        "Draft the FS from this Linear issue, the old spec, and these implementation notes. Keep it product-level; don't turn payload names or UI copy into requirements."

        Workspace context:
        The provided references include behavior, UI labels, payload schemas, and implementation notes mixed together.
      expect_asks_for_reference_material: "true"
      expect_digests_behavioral_signals_only: "true"
      expect_avoids_verbatim_copying: "true"
      expect_loads_template_and_writing_guidance: "true"
      expect_emits_required_frontmatter: "true"
      expect_keeps_behavior_altitude: "true"

  - description: "frontmatter — requires shape and consolidated persona"
    vars:
      scenario: |-
        User prompt:
        "Author the functional spec for a backend service flow. It is not a click-by-click journey, so don't force Trigger, Primary actor, and Main flow if they don't fit."

        Workspace context:
        The Sheet row has a canonical ID, repo, category, title, and persona. The spec file owns any shape classification.
      expect_routes_functional_docs_to_authoring_functional_spec: "true"
      expect_requires_shape_and_persona_frontmatter: "true"
      expect_constrains_shape_values: "true"
      expect_constrains_persona_values: "true"
      expect_omits_date_and_version_frontmatter: "true"
      expect_uses_git_history_for_provenance: "true"
      expect_supports_shape_menus_without_placeholders: "true"

  - description: "shape lenses — loads the relevant menu instead of a fixed journey scaffold"
    vars:
      scenario: |-
        User prompt:
        "Create a functional spec for an install/setup procedure. It needs preconditions, verification, rollback, and idempotency, not alternate UI flows."

        Workspace context:
        The subject is an install procedure with operator-visible outcomes and failure classes.
      expect_routes_functional_docs_to_authoring_functional_spec: "true"
      expect_loads_shape_lens_guidance: "true"
      expect_supports_shape_menus_without_placeholders: "true"
      expect_keeps_behavior_altitude: "true"

  - description: "brainstorming — behavioral summary gate before drafting"
    vars:
      scenario: |-
        User prompt:
        "Before you write the FS, grill me on the behavioral assumptions. I don't want assumption-based gaps committed into the prose."

        Workspace context:
        Multiple valid scope choices exist and sibling specs may constrain the boundary.
      expect_brainstorms_before_drafting: "true"
      expect_records_assumptions_before_first_question: "true"
      expect_does_not_handoff_to_brainstorming: "true"
      expect_writes_behavioral_summary_before_drafting: "true"
      expect_waits_for_user_approval_before_drafting: "true"

  - description: "user-approval gate — waits for approval before committing"
    vars:
      scenario: |-
        User prompt:
        "Once the FS draft is in place, review it and commit it locally. Do not push."

        Workspace context:
        The draft may still contain placeholders, contradictions, or unresolved behavior questions.
      expect_brainstorms_before_drafting: "true"
      expect_does_not_handoff_to_brainstorming: "true"
      expect_self_reviews_before_showing_user: "true"
      expect_shows_draft_before_committing: "true"
      expect_waits_for_user_approval_before_commit: "true"
      expect_refuses_downstream_artifact: "true"
      expect_offers_commit_without_push: "true"

  - description: "code-grounded behavior — code informs behavior without design leakage"
    vars:
      scenario: |-
        User prompt:
        "Some of this flow already exists in code. Use it to keep the functional spec honest, but don't make the FS a code walkthrough. There might be a helper in another repo if I point you there."

        Workspace context:
        The code contains file paths, class names, payload schemas, retry constants, and event names.
      expect_asks_for_reference_material: "true"
      expect_primary_code_expected_in_sheet_repo: "true"
      expect_requires_user_override_for_secondary_repo_code: "true"
      expect_uses_code_only_to_ground_behavior: "true"
      expect_digests_behavioral_signals_only: "true"
      expect_keeps_behavior_altitude: "true"

  - description: "sibling flows and production artifacts — preserve stable traceability"
    vars:
      scenario: |-
        User prompt:
        "This FS should call out what belongs to the sibling flow and refer to the existing intent.md artifact where that boundary is already defined."

        Workspace context:
        The related flow has its own canonical ID. Some design-phase names are unstable, but the production artifact names are stable.
      expect_cites_production_artifacts_by_stable_name: "true"
      expect_preserves_sibling_flow_traceability: "true"
      expect_keeps_behavior_altitude: "true"
