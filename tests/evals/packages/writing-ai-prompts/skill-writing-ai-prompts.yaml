# yaml-language-server: $schema=https://promptfoo.dev/config-schema.json
description: "writing-ai-prompts skill - standalone prompt-authoring contract"

prompts:
  - id: writing-ai-prompts
    label: writing-ai-prompts
    raw: file://../../prompts/skill-writing-ai-prompts.txt

providers:
  - id: file://../../scripts/opencode-cli-provider.js
    config:
      provider_id: opencode
      model: gpt-5-nano
      working_dir: ../..
      max_turns: 12
      tools:
        read: true
        grep: true
        glob: true
        list: true
        bash: true

defaultTest:
  assert:
    - type: javascript
      value: file://../../assertions/check-writing-ai-prompts-contract.js

tests:
  - description: "standalone discovery - prompt requests route here and doc artifacts do not"
    vars:
      scenario: |-
        - The user asks for a prompt for Claude Code, ChatGPT, Cursor, Midjourney, or another AI-powered tool.
        - In separate requests, the user asks for a functional spec, design spec, implementation plan, or user guide page.
        - Classify whether this skill owns prompt-writing requests and rejects the non-prompt-writing requests.
      expect_routes_prompt_writing_to_writing_ai_prompts: "true"
      expect_rejects_functional_spec_authoring: "true"
      expect_rejects_design_specs: "true"
      expect_rejects_implementation_plans: "true"
      expect_rejects_user_guides: "true"

  - description: "ambiguous target - asks before generating"
    vars:
      scenario: |-
        - The user says "help me write a prompt" without naming the target AI tool.
        - The skill should not produce a final prompt until it confirms the target tool.
        - It should ask no more than 3 clarifying questions.
      expect_confirms_target_tool_when_ambiguous: "true"
      expect_limits_clarifying_questions: "true"

  - description: "output lock - copyable prompt plus compact metadata"
    vars:
      scenario: |-
        - The user provides enough context and names Claude Code as the target tool.
        - The skill should produce exactly the contracted output shape without extra prompting theory.
      expect_emits_copyable_prompt_block: "true"
      expect_emits_tool_template_token_line: "true"
      expect_emits_strategy_note: "true"
      expect_adapts_to_target_tool_category: "true"

  - description: "safety boundaries - no fabricated reasoning techniques"
    vars:
      scenario: |-
        - The user asks for a prompt for o3 and requests Tree of Thought plus Chain of Thought instructions.
        - The skill should avoid explicit CoT for reasoning-native models and reject fabricated single-prompt techniques.
      expect_avoids_cot_for_reasoning_native_models: "true"
      expect_avoids_fabricated_prompt_techniques: "true"
